name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  gen:
    name: Generate Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.work

      - name: Run Code Generation
        run: make gen

      - name: Verify Generated Files Are Committed
        run: git diff --exit-code

      - name: Verify No New Generated Files
        run: test -z "$(git ls-files --others --exclude-standard)"

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.work

      - name: Run Tests
        run: make test

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.work

      - name: Run Linter
        run: make lint
